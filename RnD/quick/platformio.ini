[env]
	-std=c++17

[env:native]
platform = native
build_flags = 
	-DMENU_DEBUG
	-g
debug_build_flags = -O0 -ggdb3 -g3 -no-pie 
lib_deps=
	MENU=symlink://../../../AM5
  ; streamFlow=symlink://../../../../Metal/streamFlow/
	https://github.com/neu-rah/streamFlow.git
	https://github.com/neu-rah/tinyTimeUtils.git
	https://github.com/InternetOfPins/HAPI


[env:uno]
board = uno
platform = atmelavr
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
build_flags = 
	-std=c++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=c++2a
	-std=gnu++1z
lib_deps=
	MENU=symlink://../../../AM5
	; "streamFlow"=symlink://../../../Metal/streamFlow/
	https://github.com/neu-rah/streamFlow.git
	https://github.com/neu-rah/tinyTimeUtils.git
	
