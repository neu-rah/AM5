[env]
board = uno
platform = atmelavr
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
build_flags = 
	-std=c++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=c++2a
	-std=gnu++1z
lib_deps=
	MENU=symlink://../../../AM5
	; "streamFlow"=symlink://../../../Metal/streamFlow/
	https://github.com/neu-rah/streamFlow.git
	https://github.com/neu-rah/tinyTimeUtils.git
	

[env:F0]
build_flags = -DF0

[env:F1]
build_flags = -DF1

[env:F2]
build_flags = -DF2

[env:F3]
build_flags = -DF3

[env:F4]
build_flags = -DF4
