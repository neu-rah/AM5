[env:TMP]
board = uno
platform = atmelavr
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
build_flags = 
	-D TMP
	-std=c++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=c++2a
	-std=gnu++1z
lib_deps=
	MENU=symlink://../../../AM5
	; "streamFlow"=symlink://../../../Metal/streamFlow/
	https://github.com/neu-rah/streamFlow.git
	https://github.com/neu-rah/tinyTimeUtils.git
	
